<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkVibe QR Trade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>InkVibe QR Trade</h1>

  <div class="trade-container">

    <!-- INVENTAR -->
    <div class="section">
      <h2>Dein Inventar</h2>
      <div id="inventory"></div>
    </div>

    <!-- AUSGEWÄHLTE KARTE + QR -->
    <div class="section">
      <h2>Trade vorbereiten</h2>

      <p id="selectedCardText">Keine Karte ausgewählt</p>
      <button id="generateBtn" onclick="generateSelectedTradeQR()" disabled>
        QR-Code erzeugen
      </button>

      <div id="qrcode"></div>
      <p id="tradeStatus"></p>
    </div>
