<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Mystic Edition</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png" type="image/png">
<h2> <a href="https://gachagm.github.io/InkVibe/wiki.html">For starters: InkVibe wiki</a></h2>
</head>

<body>

<div class="header">
  <h1>✦ InkVibe ✦</h1>
  <select onchange="changeLang(this.value)">
    <option value="de">Deutsch</option>
    <option value="en">English</option>
    <option value="jp">日本語</option>
  </select>
</div>

<div class="panel">
  <p id="points">Ink: 0</p>
  <div class="buttons">
    <button onclick="collectDaily()">Daily</button>
    <button onclick="draw()">Draw (5)</button>
    <button onclick="fight()">Fight</button>
    <button onclick="goLogin()">Login Schulaccount</button>
  </div>
  <div id="drawAnimation" class="draw-animation"></div>
</div>

<div class="panel">
  <h2>Collection</h2>
  <div id="collection" class="card-container"></div>
</div>

<script src="script.js"></script>

</body>
</html>
