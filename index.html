<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Anime Card Game</title>

<!-- Anime Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
  text-align: center;
}

/* Glow Titel */
h1 {
  margin-top: 20px;
  font-size: 2.5em;
  text-shadow: 0 0 20px #6366f1;
}

/* Buttons & Select */
button, select {
  padding: 10px 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: rgba(99,102,241,0.2);
  color: white;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #6366f1;
  box-shadow: 0 0 15px #6366f1;
}

/* Punkte-Anzeige */
#pointsDisplay {
  font-size: 18px;
  margin-top: 15px;
}

/* Karte */
.card {
  margin-top: 20px;
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 25px rgba(99,102,241,0.5);
  display: inline-block;
  animation: fadeIn 0.5s ease;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0;
}

/* Sammlung */
#collection p {
  opacity: 0.8;
  font-size: 14px;
}

/* Animation */
@keyframes fadeIn {
  from {opacity:0; transform: scale(0.8);}
  to {opacity:1; transform: scale(1);}
}
</style>
</head>

<body>

<h1>✦ InkVibe ✦</h1>

<select onchange="changeLang(this.value)">
  <option value="de">Deutsch</option>
  <option value="en">English</option>
  <option value="jp">日本語</option>
</select>

<br>

<p id="pointsDisplay">Ink: 0</p>
<button onclick="doAction()">Aktion machen +1 Ink</button>
<button onclick="drawCard()" id="drawBtn">Karte ziehen (5 Ink)</button>

<div id="cardContainer"></div>

<h2>Collection</h2>
<div id="collection"></div>

<script>
// 🌍 Sprache
let lang = "de";
const text = {
  de: { draw: "Karte ziehen (5 Ink)", action: "Aktion machen +1 Ink" },
  en: { draw: "Draw Card (5 Ink)", action: "Do Action +1 Ink" },
  jp: { draw: "カードを引く（Ink 5）", action: "アクション +1 Ink" }
};

function changeLang(l) {
  lang = l;
  document.getElementById("drawBtn").innerText = text[lang].draw;
  document.getElementById("actionBtn").innerText = text[lang].action;
  showCollection();
}

// 🃏 Karten
const cards = [
{
  name: {de:"Feuerdrache", en:"Fire Dragon", jp:"火のドラゴン"},
  img: "https://picsum.photos/200?random=1"
},
{
  name: {de:"Wassergeist", en:"Water Spirit", jp:"水の精霊"},
  img: "https://picsum.photos/200?random=2"
},
{
  name: {de:"Schattenwolf", en:"Shadow Wolf", jp:"影のオオカミ"},
  img: "https://picsum.photos/200?random=3"
}
];

// 💾 Speicher
let collection = JSON.parse(localStorage.getItem("cards")) || [];
let points = Number(localStorage.getItem("points")) || 0;

// 🔹 Aktion +1 Ink
function doAction() {
  points += 1;
  localStorage.setItem("points", points);
  updatePoints();
}

function updatePoints() {
  document.getElementById("pointsDisplay").innerText = "Ink: " + points;
}

// 🔹 Karte ziehen (5 Ink)
function drawCard() {
  if(points >= 5){
    points -= 5;
    localStorage.setItem("points", points);
    updatePoints();
    
    let c = cards[Math.floor(Math.random()*cards.length)];
    collection.push(c);
    localStorage.setItem("cards", JSON.stringify(collection));
    showCard(c);
    showCollection();
  } else {
    alert(lang=="de" ? "Du brauchst mehr Ink, um eine Karte zu ziehen!" : 
          lang=="en" ? "You need more Ink to draw a card!" : 
          "カードを引くにはもっとInkが必要です！");
  }
}

// 🔹 Anzeige Karte
function showCard(c) {
  document.getElementById("cardContainer").innerHTML = `
    <div class="card">
      <h3>${c.name[lang]}</h3>
      <img src="${c.img}">
    </div>
  `;
}

// 🔹 Sammlung anzeigen
function showCollection() {
  let html = "";
  collection.forEach(c => {
    html += `<p>✧ ${c.name[lang]}</p>`;
  });
  document.getElementById("collection").innerHTML = html;
}

// 🔹 Start
updatePoints();
showCollection();
</script>

</body>
</html>
