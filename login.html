<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login - InkVibe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">
<h2>Schul Login</h2>
<input id="mail" placeholder="name@mg.nuernberg.de"><br>
<button onclick="login()">Login</button>
</div>

<script>
function login(){
  let mail=document.getElementById("mail").value;
  if(!mail.includes("@mg.nuernberg.de")){
    alert("Nur Schul-Mail!");
    return;
  }
  localStorage.setItem("loggedIn","true");
  if(!localStorage.getItem("loginBonus")){
    let p=Number(localStorage.getItem("points"))||0;
    p+=30;
    localStorage.setItem("points",p);
    localStorage.setItem("loginBonus","true");
  }
  alert("Erfolgreich!");
  window.location.href="index.html";
}
</script>

</body>
</html>
